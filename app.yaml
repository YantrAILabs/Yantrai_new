runtime: python314
env: standard

automatic_scaling:
  max_instances: 2

handlers:
  - url: /
    static_files: index.html
    upload: index.html
    secure: always

  - url: /(.*\.html)
    static_files: \1
    upload: .*\.html
    secure: always

  - url: /(.*\.(css|js|png|jpg|jpeg|gif|svg|webp|ico|txt|xml|json|pdf|woff|woff2))
    static_files: \1
    upload: .*\.(css|js|png|jpg|jpeg|gif|svg|webp|ico|txt|xml|json|pdf|woff|woff2)
    secure: always
